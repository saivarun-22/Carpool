<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancellation | Carpool</title>
    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            border: 0;
        }
        form{
            max-width: 80%;
            margin: 20px auto;
            background-color: rgb(47,81,76,0.5);
            display: grid;
            grid-template-columns: repeat(3,1fr);
            grid-gap: 20px;
            padding: 30px;
            border-radius:5px;
            
        }
        h3{
            grid-column-start: 1;
            grid-column-end: 4;
            grid-row-start: 1;
            grid-row-end: 2;
            text-align: center;
        }
        input{
            width: 100%;
            height: 40px;
            border: 1px solid black;
            border-radius: 5px;
        }
        button{
            height: 30px;
            background-color: white;
            border: 1px solid black;
            color: black;
            border-radius: 5px;
            grid-column-start: 2;
            grid-column-end: 3;
            grid-row-start: 3;
            grid-row-end: 4;
            max-width: 90%;
            cursor: pointer;
            position: relative;
            left: 20px;
        }
        button:hover{
            background-color: blue;
            color: white;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            font-style: oblique;
            border-radius: 5px;
            border: 1px solid blue;
        }
    </style>
</head>
<body>
    <form action="">
        <h3>Ticket Cancellation</h3>
        <div>
            <label>Ticket Number</label>
            <input type="text" name="Tnumber" id="Tnumber" placeholder="APXXXXXXX">
        </div>
        <div>
            <label>Captcha</label>
            <input type="text" name="" id="">
        </div>
        <div>
            <h4>Captcha : $ujith@</h4>
        </div>
        <button type="submit">Cancel Now</button>
    </form>
    
</body>
</html>
